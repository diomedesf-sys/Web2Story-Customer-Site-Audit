version: '3.9'

services:
  backend:
    build: ./backend
    container_name: audit-engine-backend-dev
    ports:
      - "3001:3001"
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/reports:/app/reports
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    command: npm run dev
