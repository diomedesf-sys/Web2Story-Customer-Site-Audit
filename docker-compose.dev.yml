version: '3.9'

services:
  backend:
    build: ./backend
    container_name: audit-engine-backend-dev
    ports:
      - "3001:3001"
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./reports:/app/reports
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    command: npm run dev

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  redis-data:
